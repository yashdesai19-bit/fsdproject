<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Expense Dashboard</title>

<!-- CSS -->
<link rel="stylesheet" href="style.css">
<link rel="script.js" href="">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="header">💰 Expense Tracker</div>

<div class="container">

<div class="balance">
    <h4>💰 Total Balance</h4>
    <h2 id="balance">₹ 0</h2>
</div>

<div class="section">
    <h3>Add Balance</h3>
    <input type="number" id="balanceInput" placeholder="Enter amount">
    <button onclick="addBalance()">Add Balance</button>
</div>

<div class="grid">
    <div class="card" onclick="show('add')">➕ Add Expense</div>
    <div class="card" onclick="show('list')">📋 Expenses</div>
    <div class="card" onclick="show('analytics')">📊 Analytics</div>
    <div class="card" onclick="show('budget')">🎯 Budget</div>
</div>

<div class="section" id="add">
    <h3>Add Expense</h3>
    <input type="number" id="amount" placeholder="Enter amount">

    <select id="category">
        <option>Food</option>
        <option>Transport</option>
        <option>Shopping</option>
        <option>Other</option>
    </select>

    <input type="text" id="description" placeholder="Enter description">

    <button onclick="addExpense()">Add</button>
</div>

<div class="section hidden" id="list">
    <h3>Recent Expenses</h3>

    <button onclick="downloadPDF()">Download Monthly Report</button>
    <button onclick="clearExpenses()" class="danger-btn">Clear All Transactions</button>

    <div id="expenseList"></div>
</div>

<div class="section hidden" id="analytics">
    <h3>Analytics</h3>
    <div class="chart-box">
        <canvas id="expenseChart"></canvas>
    </div>
</div>

<div class="section hidden" id="budget">
    <h3>Budget</h3>
    <input type="number" id="budgetInput" placeholder="Enter budget">
    <button onclick="saveBudget()">Save</button>

    <p>Budget: ₹ <span id="budgetValue">0</span></p>
    <p>Spent: ₹ <span id="spentAmount">0</span></p>
    <p>Status: <span id="budgetStatus"></span></p>
</div>

</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
